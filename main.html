<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Dashboard</title>
</head>
<body class="bg-gray-50 min-h-screen font-sans">
    <div class="navbar bg-white shadow-sm px-4 lg:px-20 border-b border-gray-100 sticky top-0 z-50">
        <div class="flex-1">
            <div class="flex items-center gap-3">
                <img src="https://cdn-icons-png.flaticon.com/512/25/25231.png" alt="Logo" class="w-10 h-10">
                <a class="text-2xl font-black tracking-tighter text-gray-800">GITHUB ISSUES</a>
            </div>
        </div>
        <div class="flex-none gap-4">
            <div class="form-control flex-row gap-3">
                <input type="text" id="search-input" placeholder="Search issues..." class="input input-bordered w-48 md:w-96 h-12 bg-gray-50 border-gray-200 focus:bg-white transition-all duration-200" />
                <button class="btn btn-primary h-12 px-6 bg-indigo-600 border-none hover:bg-indigo-700 text-white font-bold shadow-md">+ New Issue</button>
            </div>
            <button onclick="logout()" class="btn btn-ghost btn-circle text-gray-400 hover:text-red-500 transition-colors duration-200">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" /></svg>
            </button>
        </div>
    </div>

    <main class="max-w-7xl mx-auto p-4 lg:p-12">
        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-2 mb-10 inline-flex gap-2">
            <button class="tab-btn btn btn-ghost btn-lg bg-indigo-600 text-white hover:bg-indigo-700 px-10 h-14 rounded-xl font-bold" data-tab="all">All</button>
            <button class="tab-btn btn btn-ghost btn-lg text-gray-500 hover:bg-gray-100 px-10 h-14 rounded-xl font-bold" data-tab="open">Open</button>
            <button class="tab-btn btn btn-ghost btn-lg text-gray-500 hover:bg-gray-100 px-10 h-14 rounded-xl font-bold" data-tab="closed">Closed</button>
        </div>

        <div class="flex flex-col md:flex-row md:items-center justify-between mb-12 pb-8 border-b border-gray-100 gap-6">
            <div class="flex items-center gap-6">
                <div class="w-16 h-16 rounded-3xl bg-indigo-50 flex items-center justify-center text-indigo-600 shadow-inner overflow-hidden">
                    <img src="assets/Aperture.png" alt="Aperture" class="w-8 h-8 object-contain">
                </div>
                <div>
                    <h2 class="text-4xl font-black text-gray-800 tracking-tight"><span id="issue-count">0</span> Issues</h2>
                    <p class="text-gray-500 font-bold text-sm uppercase tracking-widest mt-1">Project Milestone: v1.0.4</p>
                </div>
            </div>
            <div class="flex items-center gap-8 font-black text-xs uppercase tracking-tighter">
                <div class="flex items-center gap-3 text-emerald-600 bg-emerald-50 px-4 py-2 rounded-full">
                    <img src="assets/Open-Status.png" alt="Open" class="w-4 h-4 object-contain">
                    <span>Open Issues</span>
                </div>
                <div class="flex items-center gap-3 text-indigo-600 bg-indigo-50 px-4 py-2 rounded-full">
                    <img src="assets/Closed- Status .png" alt="Closed" class="w-4 h-4 object-contain">
                    <span>Closed Issues</span>
                </div>
            </div>
        </div>

        <div id="loading-spinner" class="flex flex-col justify-center items-center py-32 space-y-4">
            <span class="loading loading-spinner loading-lg text-indigo-600 w-16"></span>
            <p class="text-gray-400 font-bold text-xs uppercase tracking-widest">Fetching data from server...</p>
        </div>

        <div id="issues-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-8">
            
        </div>
    </main>

    <dialog id="issue-modal" class="modal">
        <div class="modal-box w-11/12 max-w-3xl border-none shadow-3xl p-0 overflow-hidden rounded-[2rem] bg-white">
            <div id="modal-content">
               
            </div>
            <div class="modal-action p-8 border-t border-gray-50 flex justify-end bg-gray-50/50">
                <form method="dialog">
                    <button class="btn btn-primary bg-gray-800 border-none hover:bg-black text-white px-10 h-14 rounded-2xl font-bold transition-all duration-300">Close Window</button>
                </form>
            </div>
        </div>
        <form method="dialog" class="modal-backdrop">
            <button>close</button>
        </form>
    </dialog>

    <script src="script.js"></script>
</body>
</html>
